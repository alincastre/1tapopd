<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Out Patient Department Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f2f5f8;
}

.container{
    max-width:900px;
    margin:auto;
    padding:30px;
}

h1{
    text-align:center;
    color:#1565C0;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{

    background:white;
    border-radius:15px;
    padding:25px;

    box-shadow:0 5px 15px rgba(0,0,0,.1);

    text-align:center;

}

.count{

    font-size:60px;
    font-weight:bold;
    color:#4CAF50;

    margin:15px;

}

button{

    width:100%;

    padding:18px;

    font-size:20px;

    background:#1976D2;

    color:white;

    border:none;

    border-radius:10px;

    cursor:pointer;

}

button:hover{

    background:#1565C0;

}

.total{

    margin-top:30px;

    background:#263238;

    color:white;

    border-radius:15px;

    padding:25px;

    text-align:center;

}

.total h2{

    margin:0;

}

.total div{

    font-size:80px;

    font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<h1>Out Patient Department Dashboard</h1>

<div class="cards">

<div class="card">

<h2>👨‍⚕️ General Doctor</h2>

<div id="general" class="count">0</div>

<button onclick="save('General Doctor')">
Add Patient
</button>

</div>

<div class="card">

<h2>👶 Pediatrics</h2>

<div id="pediatrics" class="count">0</div>

<button onclick="save('Pediatrics')">
Add Patient
</button>

</div>

<div class="card">

<h2>🩺 Internal Medicine</h2>

<div id="internal" class="count">0</div>

<button onclick="save('Internal Medicine')">
Add Patient
</button>

</div>

</div>

<div class="total">

<h2>Total Patients</h2>

<div id="total">0</div>

</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxvp2hLlS9II9q9sgvybJhQjDQ4kFel_oNXtjJ_GWmZuklqlLTF0E2QatkVw59mhRS8/exec";

loadDashboard();

function save(department){

fetch(SCRIPT_URL,{

method:"POST",

body:JSON.stringify({

department:department

})

})

.then(res=>res.json())

.then(updateDashboard)

.catch(err=>alert(err));

}

function loadDashboard(){

fetch(SCRIPT_URL)

.then(res=>res.json())

.then(updateDashboard);

}

function updateDashboard(data){

document.getElementById("general").textContent=data.general;

document.getElementById("pediatrics").textContent=data.pediatrics;

document.getElementById("internal").textContent=data.internal;

document.getElementById("total").textContent=data.total;

}

</script>

</body>
</html>
