<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Patient Counter</title>

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    text-align:center;
    padding:40px;
}

.card{
    max-width:500px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

h1{
    color:#2196F3;
}

#total{
    font-size:70px;
    font-weight:bold;
    margin:20px;
    color:#4CAF50;
}

button{
    width:100%;
    padding:25px;
    font-size:30px;
    border:none;
    border-radius:12px;
    background:#2196F3;
    color:white;
    cursor:pointer;
}

button:active{
    transform:scale(.98);
}

.status{
    margin-top:20px;
    color:green;
}
</style>

</head>
<body>

<div class="card">

<h1>👨‍⚕️ OPD Dashboard 👩‍⚕️</h1>

<div>Total Patients</div>

<div id="total">0</div>

<button onclick="savePatient()">
➕ Patient
</button>

<div class="status" id="status"></div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxM_OHbEJPj0EVeCJ3Go4nj1RXR0LBvi7jM8MT0w7WS0ZKdOTbPMc88HmbOZht_gTzP/exec";

loadTotal();

function savePatient(){

document.getElementById("status").innerHTML="Saving...";

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
action:"save"
})
})
.then(r=>r.json())
.then(data=>{
document.getElementById("status").innerHTML="Saved!";
document.getElementById("total").innerHTML=data.total;
});

}

function loadTotal(){

fetch(SCRIPT_URL)
.then(r=>r.json())
.then(data=>{
document.getElementById("total").innerHTML=data.total;
});

}

</script>

</body>
</html>
